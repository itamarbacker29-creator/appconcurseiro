name: Push Notifications Diárias

on:
  schedule:
    # 11h UTC = 8h de Brasília (BRT = UTC-3)
    - cron: '0 11 * * *'
  workflow_dispatch: # permite acionar manualmente para teste

jobs:
  enviar-push:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificações push diárias
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://www.otutor.com.br/api/push/diario")
          echo "HTTP status: $HTTP"
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "Erro: status HTTP $HTTP"
            exit 1
          fi
